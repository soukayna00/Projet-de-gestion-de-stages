version: "3.9"

services:

  # =====================
  #  Laravel App (PHP)
  # =====================
  app:
    build:
      context: ./docker/php
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
    networks:
      - app-network

  # =====================
  #  Nginx
  # =====================
  webserver:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # =====================
  #  PostgreSQL DB
  # =====================
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  # =====================
  #  Vue Frontend
  # =====================
  frontend:
    image: node:20-alpine
    container_name: vue_app
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - app-network

# =====================
#  Volumes
# =====================
volumes:
  pgdata:

# =====================
#  Network
# =====================
networks:
  app-network:
    driver: bridge